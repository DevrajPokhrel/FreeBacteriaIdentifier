<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bacterial Identification Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f2;
    --white: #ffffff;
    --dark: #1a1a2e;
    --mid: #4a4a6a;
    --accent-blue: #7bb3c9;
    --accent-blue-light: #b8d8e8;
    --accent-blue-pale: #dceef6;
    --accent-green: #8bbfa8;
    --accent-green-pale: #d4ede3;
    --blob-bottom-left: #c3d9e8;
    --blob-top-right: #c8dfc8;
    --positive: #4a9e78;
    --negative: #c0392b;
    --neutral: #7b8fa6;
    --card-shadow: 0 4px 24px rgba(30,30,60,0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── decorative background blobs ── */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .bg-blob-tl {
    width: 280px; height: 280px;
    top: -80px; right: -60px;
    background: var(--blob-top-right);
    opacity: 0.45;
    border-radius: 40% 60% 55% 45%;
  }
  .bg-blob-bl {
    width: 320px; height: 240px;
    bottom: -60px; left: -70px;
    background: var(--blob-bottom-left);
    opacity: 0.45;
    border-radius: 55% 45% 40% 60%;
  }
  /* floating DNA / molecule decorations */
  .deco { position: fixed; pointer-events: none; z-index: 0; opacity: 0.13; }
  .deco-tr { top: 90px; right: 60px; font-size: 64px; transform: rotate(20deg); }
  .deco-br { bottom: 120px; right: 40px; font-size: 48px; }
  .deco-bl { bottom: 80px; left: 50px; font-size: 38px; transform: rotate(-15deg); }

  /* ── layout ── */
  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── header ── */
  header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 48px; }
  .header-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent-blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(123,179,201,0.4);
  }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 4vw, 38px);
    color: var(--dark);
    line-height: 1.15;
  }
  .header-text h1 span { color: var(--accent-blue); }
  .header-text p {
    font-size: 15px; color: var(--mid); margin-top: 6px;
    font-weight: 300; max-width: 520px;
  }

  /* ── section title ── */
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--mid);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: #ddd;
  }

  /* ── test grid ── */
  .tests-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .test-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    border: 2px solid transparent;
    user-select: none;
  }
  .test-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(30,30,60,0.13); }

  .test-card .tc-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--mid); margin-bottom: 10px; text-transform: uppercase;
  }
  .test-card .tc-name {
    font-family: 'DM Serif Display', serif;
    font-size: 16px; color: var(--dark); margin-bottom: 12px; line-height: 1.2;
  }
  .tc-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

  .tc-btn {
    flex: 1; min-width: 36px;
    border: none; border-radius: 8px; padding: 6px 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .tc-btn.pos { background: var(--accent-green-pale); color: var(--positive); }
  .tc-btn.neg { background: #fde8e8; color: var(--negative); }
  .tc-btn.na  { background: #f0f0f0; color: var(--mid); font-size: 11px; }
  .tc-btn.active.pos { background: var(--positive); color: #fff; }
  .tc-btn.active.neg { background: var(--negative); color: #fff; }
  .tc-btn.active.na  { background: var(--mid); color: #fff; }
  .tc-btn:hover { filter: brightness(0.93); }

  /* ── tsi special ── */
  .tsi-options {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .tsi-chip {
    border: none; border-radius: 7px; padding: 6px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; background: #f0f0f0; color: var(--mid);
    transition: all 0.15s;
  }
  .tsi-chip:hover { background: #e0e0e0; }
  .tsi-chip.active { background: var(--dark); color: #fff; }

  /* ── identify button ── */
  .identify-btn {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--accent-blue) 0%, #5a96b8 100%);
    color: #fff; border: none; border-radius: var(--radius);
    padding: 18px 24px; font-family: 'DM Serif Display', serif;
    font-size: 20px; cursor: pointer; letter-spacing: 0.3px;
    box-shadow: 0 6px 24px rgba(90,150,184,0.35);
    transition: transform 0.18s, box-shadow 0.18s;
    margin-bottom: 36px;
  }
  .identify-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(90,150,184,0.45); }
  .identify-btn:active { transform: translateY(0); }

  /* ── results ── */
  #results { display: none; }
  #results.visible { display: block; animation: slideUp 0.35s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    box-shadow: var(--card-shadow);
    margin-bottom: 14px;
    border-left: 5px solid var(--accent-blue);
  }
  .result-card.best { border-left-color: var(--positive); }
  .result-card.low  { border-left-color: #e0a020; opacity: 0.85; }

  .result-match-badge {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
    text-transform: uppercase;
  }
  .result-card.best .result-match-badge { background: var(--accent-green-pale); color: var(--positive); }
  .result-card:not(.best) .result-match-badge { background: #fef3e0; color: #b07010; }

  .result-name {
    font-family: 'DM Serif Display', serif;
    font-size: 24px; color: var(--dark); margin-bottom: 6px;
  }
  .result-score {
    font-size: 13px; color: var(--mid); margin-bottom: 14px;
  }
  .score-bar-bg {
    height: 6px; background: #eee; border-radius: 99px; overflow: hidden; margin-bottom: 18px;
  }
  .score-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-blue), var(--positive));
    transition: width 0.6s ease;
  }
  .result-traits {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .trait-pill {
    font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: 500;
  }
  .trait-pill.pos { background: var(--accent-green-pale); color: var(--positive); }
  .trait-pill.neg { background: #fde8e8; color: var(--negative); }

  .no-match {
    background: var(--white); border-radius: var(--radius);
    padding: 36px; text-align: center; box-shadow: var(--card-shadow);
  }
  .no-match .nm-icon { font-size: 40px; margin-bottom: 10px; }
  .no-match h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 6px; }
  .no-match p { color: var(--mid); font-size: 14px; }

  /* ── reset ── */
  .reset-btn {
    background: none; border: 2px solid #ddd; border-radius: 10px;
    padding: 10px 22px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--mid); cursor: pointer;
    transition: all 0.15s; margin-top: 8px;
  }
  .reset-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  /* ── footer ── */
  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid #e0e0e0;
    font-size: 13px;
    color: var(--mid);
    font-weight: 300;
    letter-spacing: 0.3px;
  }
  footer span { color: var(--dark); font-weight: 500; }

  /* ── mobile ── */
  @media (max-width: 500px) {
    .tests-grid { grid-template-columns: repeat(2, 1fr); }
    .header-text h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- background decorations -->
<div class="bg-blob bg-blob-tl"></div>
<div class="bg-blob bg-blob-bl"></div>
<div class="deco deco-tr">🧬</div>
<div class="deco deco-br">🔬</div>
<div class="deco deco-bl">⚗️</div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="header-icon">🦠</div>
    <div class="header-text">
      <h1>Bacterial <span>Identification</span> Tool</h1>
      <p>Select your biochemical test results to identify the most likely organism from the database.</p>
    </div>
  </header>

  <!-- Tests -->
  <div class="section-title">Select Test Results</div>
  <div class="tests-grid" id="testsGrid"></div>

  <button class="identify-btn" onclick="identify()">🔍 Identify Organism</button>

  <!-- Results -->
  <div id="results">
    <div class="section-title">Identification Results</div>
    <div id="resultsContent"></div>
    <button class="reset-btn" onclick="reset()">↺ Reset All Tests</button>
  </div>

  <footer>
    &copy; 2026 <span>Devraj Pokhrel</span>. All rights reserved.
  </footer>

</div>

<script>
// ── Bacterial database ──
const bacteria = [
  {
    name: "E. coli",
    catalase: "+", oxidase: "-", indole: "-", mr: "-", vp: "+", citrate: "+",
    urease: "-", tsi: "A/A", gas: "+", h2s: "-", motility: "+", lactose: "LF",
    positives: "Motile, TSI A/A, Gas +",
    negatives: "—"
  },
  {
    name: "Acinetobacter spp.",
    catalase: null, oxidase: null, indole: "-", mr: "+", vp: "-", citrate: "-",
    urease: "-", tsi: "K/K", gas: "-", h2s: "-", motility: "-", lactose: "NLF",
    positives: "Non-motile, Non-fermenter (K/K)",
    negatives: "Motile organisms, Fermenters"
  },
  {
    name: "Klebsiella pneumoniae",
    catalase: null, oxidase: null, indole: "-", mr: "+", vp: "-", citrate: "+",
    urease: "+", tsi: "A/A", gas: "-", h2s: "-", motility: "-", lactose: "LF",
    positives: "Lactose fermenter, Non-motile, Citrate+, Urease+",
    negatives: "Motile organisms, Indole+"
  },
  {
    name: "Klebsiella oxytoca",
    catalase: null, oxidase: null, indole: "+", mr: "-", vp: "-", citrate: "+",
    urease: "-", tsi: "A/A", gas: "+", h2s: "-", motility: "-", lactose: "LF",
    positives: "Lactose fermenter, Non-motile, Indole+",
    negatives: "Motile organisms, Indole−"
  },
  {
    name: "Acinetobacter lwoffii",
    catalase: null, oxidase: null, indole: "-", mr: "+", vp: "-", citrate: "-",
    urease: "+", tsi: "K/K", gas: "-", h2s: "-", motility: "-", lactose: "NLF",
    positives: "Non-motile, Urease+, Non-fermenter",
    negatives: "Motile organisms"
  },
  {
    name: "Serratia marcescens",
    catalase: null, oxidase: null, indole: "-", mr: "-", vp: "-", citrate: "+",
    urease: "-", tsi: "K/A", gas: "-", h2s: "-", motility: "+", lactose: "NLF",
    positives: "Motile, Citrate+, K/A",
    negatives: "Non-motile organisms, H2S+"
  },
  {
    name: "Shigella sonnei",
    catalase: null, oxidase: null, indole: "-", mr: "+", vp: "-", citrate: "-",
    urease: "-", tsi: "A/A", gas: "-", h2s: "-", motility: "-", lactose: "LF",
    positives: "Non-motile, MR+, No gas, No H2S",
    negatives: "Motile organisms, Gas+"
  },
  {
    name: "Yersinia enterocolitica",
    catalase: null, oxidase: null, indole: "-", mr: "+", vp: "-", citrate: "-",
    urease: "+", tsi: "K/A", gas: "-", h2s: "-", motility: "-", lactose: "NLF",
    positives: "Urease+, K/A, Non-motile (37°C)",
    negatives: "Motile organisms, H2S+"
  },
  {
    name: "Pseudomonas aeruginosa",
    catalase: "+", oxidase: "+", indole: "-", mr: "-", vp: "-", citrate: "+",
    urease: "-", tsi: "K/K", gas: "-", h2s: "-", motility: "+", lactose: "NLF",
    positives: "Oxidase+, Motile, K/K, Blue-green pigment, Growth at 42°C",
    negatives: "MR−, VP−, Indole−, Urease−, Gas/H2S−"
  }
];

// ── Test definitions ──
const tests = [
  { key: "catalase",  label: "Catalase",     options: ["+", "-"] },
  { key: "oxidase",   label: "Oxidase",      options: ["+", "-"] },
  { key: "indole",    label: "Indole",        options: ["+", "-"] },
  { key: "mr",        label: "Methyl Red",   options: ["+", "-"] },
  { key: "vp",        label: "VP Test",      options: ["+", "-"] },
  { key: "citrate",   label: "Citrate",      options: ["+", "-"] },
  { key: "urease",    label: "Urease",       options: ["+", "-"] },
  { key: "tsi",       label: "TSI Reaction", options: ["A/A", "K/A", "K/K"], type: "tsi" },
  { key: "gas",       label: "Gas",          options: ["+", "-"] },
  { key: "h2s",       label: "H₂S",          options: ["+", "-"] },
  { key: "motility",  label: "Motility",     options: ["+", "-"] },
  { key: "lactose",   label: "Lactose",      options: ["LF", "NLF"], type: "tsi" },
];

let selections = {};

// ── Render tests ──
function renderTests() {
  const grid = document.getElementById("testsGrid");
  grid.innerHTML = "";
  tests.forEach(t => {
    const card = document.createElement("div");
    card.className = "test-card";
    card.id = "tc-" + t.key;

    const label = `<div class="tc-label">Test</div><div class="tc-name">${t.label}</div>`;

    let btns = "";
    if (t.type === "tsi") {
      btns = `<div class="tsi-options">` +
        t.options.map(o =>
          `<button class="tsi-chip ${selections[t.key] === o ? 'active' : ''}"
            onclick="selectVal('${t.key}','${o}',this,'tsi-chip')">${o}</button>`
        ).join("") +
        `<button class="tsi-chip ${selections[t.key] === null && t.key in selections ? 'active' : ''}"
          onclick="selectVal('${t.key}',null,this,'tsi-chip')">N/A</button>` +
      `</div>`;
    } else {
      btns = `<div class="tc-buttons">` +
        `<button class="tc-btn pos ${selections[t.key] === '+' ? 'active' : ''}"
          onclick="selectVal('${t.key}','+',this,'tc-btn pos')">+</button>` +
        `<button class="tc-btn neg ${selections[t.key] === '-' ? 'active' : ''}"
          onclick="selectVal('${t.key}','-',this,'tc-btn neg')">−</button>` +
        `<button class="tc-btn na ${selections[t.key] === null && t.key in selections ? 'active' : ''}"
          onclick="selectVal('${t.key}',null,this,'tc-btn na')">N/A</button>` +
      `</div>`;
    }

    card.innerHTML = label + btns;
    grid.appendChild(card);
  });
}

function selectVal(key, val, btn, btnClass) {
  selections[key] = val;
  // update siblings
  const card = btn.closest('.test-card');
  card.querySelectorAll('.' + btnClass.split(' ')[0]).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // highlight card border
  card.style.borderColor = val === null ? '#ddd' : (val === '+' || val === 'LF' || val === 'A/A' || val === 'K/A' || val === 'K/K') ? 'var(--accent-blue)' : 'var(--accent-blue)';
}

// ── Score a bacterium ──
function scoreBacterium(b) {
  let matched = 0, total = 0, conflicts = 0;
  tests.forEach(t => {
    if (!(t.key in selections) || selections[t.key] === undefined) return;
    const userVal = selections[t.key];
    if (userVal === null) return; // N/A — skip
    const bVal = b[t.key];
    if (bVal === null) return; // bacterium doesn't have data for this test
    total++;
    if (userVal === bVal) matched++;
    else conflicts++;
  });
  if (total === 0) return { score: 0, pct: 0, matched, total, conflicts };
  return { score: matched - conflicts * 0.5, pct: Math.round((matched / total) * 100), matched, total, conflicts };
}

// ── Identify ──
function identify() {
  const selectedCount = Object.keys(selections).filter(k => selections[k] !== undefined).length;
  if (selectedCount === 0) {
    alert("Please select at least one test result to identify.");
    return;
  }

  const scored = bacteria.map(b => ({ ...b, ...scoreBacterium(b) }))
    .sort((a, b) => b.pct - a.pct);

  const top = scored.filter(b => b.pct >= 50);
  const resultsDiv = document.getElementById("results");
  const content = document.getElementById("resultsContent");
  content.innerHTML = "";

  if (top.length === 0) {
    content.innerHTML = `<div class="no-match">
      <div class="nm-icon">🔬</div>
      <h3>No Strong Match Found</h3>
      <p>No organism matched ≥50% of the provided test results.<br>Try adjusting or adding more tests for better resolution.</p>
    </div>`;
  } else {
    top.slice(0, 3).forEach((b, i) => {
      const isBest = i === 0;
      const isLow = b.pct < 65;
      const card = document.createElement("div");
      card.className = `result-card ${isBest ? 'best' : ''} ${isLow && !isBest ? 'low' : ''}`;
      card.innerHTML = `
        <div class="result-match-badge">${isBest ? '✓ Best Match' : `Match #${i+1}`}</div>
        <div class="result-name">${b.name}</div>
        <div class="result-score">${b.matched} / ${b.total} tests matched · ${b.pct}% match score</div>
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${b.pct}%"></div></div>
        <div class="result-traits">
          ${b.positives.split(',').map(t => `<span class="trait-pill pos">✓ ${t.trim()}</span>`).join('')}
          ${b.negatives !== '—' ? b.negatives.split(',').map(t => `<span class="trait-pill neg">✗ ${t.trim()}</span>`).join('') : ''}
        </div>
      `;
      content.appendChild(card);
    });
  }

  resultsDiv.classList.add("visible");
  resultsDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Reset ──
function reset() {
  selections = {};
  document.getElementById("results").classList.remove("visible");
  renderTests();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

renderTests();
</script>
</body>
</html>
